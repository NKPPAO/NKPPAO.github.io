name: Smart Portal CI/CD

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

# 1. เพิ่มสิทธิ์ให้ Workflow สามารถเขียนข้อมูลลงใน Repo ได้ (แก้ Error 128)
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Inject Supabase Keys
        run: |
          sed -i "s|MY_URL_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_URL }}|g" smartservices/index.html
          sed -i "s|MY_KEY_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}|g" smartservices/index.html
          
          # บรรทัดตรวจสอบ (Debug): พิมพ์เนื้อหาไฟล์ออกมาดูใน Log (ไม่ต้องกลัว Key หลุด เพราะ GitHub จะเซนเซอร์เป็น *** ให้เอง)
          grep "const SUPABASE_URL" smartservices/index.html

      - name: Supabase Connectivity Check
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          curl -X GET "${{ secrets.SUPABASE_SMARTSERVICES_URL }}/rest/v1/service_requests?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}" \
          -H "Content-Type: application/json"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # 2. ใส่ Token เพื่อยืนยันสิทธิ์ในการเขียน Branch
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: smartservices 
          branch: gh-pages
