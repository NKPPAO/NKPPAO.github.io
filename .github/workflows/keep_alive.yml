name: Keep Supabase Project Alive

on:
  schedule:
    # รันทุกๆ วัน เวลา 00:00 UTC (ประมาณ 07:00 น. เวลาไทย)
    - cron: '0 0 * * *'
  workflow_dispatch: # ปุ่มสำหรับกดรันเองเพื่อทดสอบ

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Request to Supabase API
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/projects?select=count" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
