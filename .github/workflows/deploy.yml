name: Smart Portal CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Inject Supabase Keys
        run: |
          # 1. แทนที่ค่าในไฟล์ index.html ที่อยู่ในโฟลเดอร์ smartservices
          sed -i "s|MY_URL_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_URL }}|g" smartservices/index.html
          sed -i "s|MY_KEY_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}|g" smartservices/index.html
          
          # 2. ตรวจสอบใน Log ว่าสำเร็จไหม (ถ้าสำเร็จจะเห็นเป็น ***)
          echo "Checking Injection Result:"
          grep "const SUPABASE_URL" smartservices/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # 3. ระบุโฟลเดอร์ต้นทางให้ชัดเจน
          folder: smartservices 
          branch: gh-pages
          # 4. ล้างไฟล์เก่าใน branch gh-pages ทิ้งให้หมดเพื่อป้องกันไฟล์ซ้ำซ้อน
          clean: true
