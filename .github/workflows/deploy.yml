name: Smart Portal CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Inject Supabase Keys
        run: |
          # 1. ตรวจสอบว่าเราอยู่ที่ไหน และมีไฟล์จริงไหม (ดูใน Log Action ได้เลย)
          echo "Current directory: $(pwd)"
          ls -R
          
          # 2. ใช้คำสั่ง sed โดยระบุ path จาก root ของ repo
          # ลองเปลี่ยนจาก ' เป็น " เพื่อให้มั่นใจว่า shell อ่านค่า secret ได้ถูกต้อง
          sed -i "s|MY_URL_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_URL }}|g" ./smartservices/index.html
          sed -i "s|MY_KEY_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}|g" ./smartservices/index.html
          
          # 3. ตรวจสอบผลลัพธ์ใน Log (ถ้าสำเร็จจะเห็นเป็น ***)
          cat ./smartservices/index.html | grep "const SUPABASE_URL"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: . 
          branch: gh-pages
