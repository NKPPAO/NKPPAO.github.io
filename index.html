<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>องค์การบริหารส่วนจังหวัดนครปฐม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            background-color: #ffffff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* วงกลม Gradient ฟุ้งๆ มุมขวาบน */
        .blob-top-right {
            position: fixed;
            top: -200px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.4) 0%, rgba(147, 51, 234, 0.2) 50%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }

        /* วงกลม Gradient ฟุ้งๆ มุมซ้ายล่าง */
        .blob-bottom-left {
            position: fixed;
            bottom: -200px;
            left: -100px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, rgba(6, 182, 212, 0.2) 50%, transparent 70%);
            filter: blur(100px);
            z-index: -1;
            animation: float 25s infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.1); }
        }

        .hero-swiper {
            width: 100%;
            padding: 50px 0 40px 0;
        }

        
        .swiper-pagination-bullet-active {
            background: #4f46e5 !important;
            width: 25px !important;
            border-radius: 5px !important;
        }


        .logo-container {
            perspective: 1000px; /* สร้างมิติความลึก */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
        }

        .logo-rotate {
            width: 150px; /* ปรับขนาดโลโก้ตามต้องการ */
            height: auto;
            animation: flip-3d 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }

        @keyframes flip-3d {
            0% { transform: rotateY(0deg); }
            20% { transform: rotateY(0deg); } /* หยุดพักด้านหน้านิดนึง */
            50% { transform: rotateY(180deg); } /* หมุนไปด้านหลัง */
            70% { transform: rotateY(180deg); } /* หยุดพักด้านหลังนิดนึง */
            100% { transform: rotateY(360deg); } /* หมุนกลับมาที่เดิม */
        }

        /* Button Section (Outside Swiper) */
        .action-area {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-top: 1rem;
            margin-bottom: 3rem;
            z-index: 20;
        }

        .btn-main {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 0.85rem 2.5rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-main:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 20px 30px -10px rgba(79, 70, 229, 0.6);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(79, 70, 229, 0.1);
            color: #4338ca;
            padding: 0.85rem 2.5rem;
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-outline:hover {
            background: #ffffff;
            border-color: #4f46e5;
            color: #4f46e5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="flex flex-col">

    <div class="blob-top-right"></div>
    <div class="blob-bottom-left"></div>

    <main class="flex-grow flex flex-col items-center">
        <div class="logo-container">
            <img src="https://nkppao.github.io/logonkp.png" alt="อบจ.นครปฐม" class="logo-rotate">
        </div>

    <section class="w-full max-w-5xl mx-auto px-6">
        <div class="swiper hero-swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide text-center">
                    <h1 class="text-4xl md:text-6xl font-black text-gray-900 mb-6 tracking-tighter">NAKHON PATHOM <span class="text-indigo-600">PAO</span></h1>
                    <p class="text-xl text-gray-500 max-w-xl mx-auto font-light leading-relaxed">องค์การบริหารส่วนจังหวัดนครปฐม</p>
                </div>
                <div class="swiper-slide text-center">
                    <h1 class="text-4xl md:text-6xl font-black text-gray-900 mb-6 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">STRATEGY & BUDGET DIVISION</h1>
                    <p class="text-xl text-gray-500 max-w-xl mx-auto font-light leading-relaxed">กองยุทธศาสตร์และงบประมาณ</p>
                </div>
                <div class="swiper-slide text-center">
                    <h1 class="text-4xl md:text-6xl font-black text-gray-900 mb-6 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">POLICY & PLANNING SECTION</h1>
                    <p class="text-xl text-gray-500 max-w-xl mx-auto font-light leading-relaxed">ฝ่ายนโยบายและแผนงาน</p>
                </div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <div class="action-area flex-wrap px-6">
        <a href="plan" class="btn-main">
            <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบข้อมูลแผนฯ
        </a>
        <a href="https://www.nkppao.go.th" target="_blank" class="btn-outline">
            <i class="fas fa-globe"></i> เว็บไซต์หลัก อบจ.
        </a>
    </div>

    </main>
    <footer class="py-4 relative z-10">
        <div class="container mx-auto px-8 text-center">
            <div class="w-20 h-1 bg-gradient-to-r from-blue-600 to-blue-100 mx-auto mb-8 rounded-full opacity-30"></div>
            <p class="text-gray-800 font-extrabold text-lg mb-1">องค์การบริหารส่วนจังหวัดนครปฐม</p>
            <p class="text-gray-400 text-xs tracking-[0.2em] uppercase font-medium">ฝ่ายนโนบายและแผนงาน กองยุทธศาสตร์และงบประมาณ | © 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".hero-swiper", {
            effect: "fade",
            fadeEffect: { crossFade: true },
            loop: true,
            autoplay: { delay: 6000, disableOnInteraction: false },
            pagination: { el: ".swiper-pagination", clickable: true },
        });
    </script>
</body>
</html>
