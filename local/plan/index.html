<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาโครงการแผนพัฒนาท้องถิ่น | NKPPAO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f8fafc] text-slate-800">
<nav class=" bg-white/30 backdrop-blur-md border-t border-slate-100 py-6 px-6">
    <div class="container mx-auto">
        <div class="flex items-center space-x-4">
            <div class="bg-white rounded-full flex items-center justify-center w-12 h-12">
                <img src="https://nkppao.github.io/logonkp.png" alt="Logo" class="w-10 h-10 object-contain">
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold leading-tight">ระบบค้นหาโครงการแผนพัฒนาท้องถิ่น</h1>
                <p class="text-xs md:text-sm font-light opacity-90 uppercase tracking-wider">Nakhon Pathom Provincial Administrative Organization</p>
            </div>
        </div>
    </div>
</nav>
 <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8 mb-10">
    
    <div class="relative overflow-hidden bg-white/70 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white/60 hover:shadow-[0_30px_60px_rgba(0,0,0,0.1)] transition-all duration-500 group">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-emerald-500/10 rounded-full blur-3xl group-hover:bg-emerald-500/20 transition-colors"></div>
        <div class="relative flex items-center gap-6">
            <div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-teal-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <div>
                <p class="text-slate-500 text-[15px] font-bold uppercase tracking-[0.15em] mb-1">งบประมาณรวมทั้งสิ้น</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="cardTotalBudget" class="text-2xl font-black text-slate-800 tracking-tight transition-all">0.00</h2>
                    <span class="text-slate-400 text-xs font-bold">บาท</span>
                </div>
            </div>
        </div>
    </div>

    <div class="relative overflow-hidden bg-white/70 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white/60 hover:shadow-[0_30px_60px_rgba(0,0,0,0.1)] transition-all duration-500 group">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl group-hover:bg-blue-500/20 transition-colors"></div>
        <div class="relative flex items-center gap-6">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <div>
                <p class="text-slate-500 text-[15px] font-bold uppercase tracking-[0.15em] mb-1">จำนวนโครงการ</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="cardTotalProjects" class="text-2xl font-black text-slate-800 tracking-tight transition-all">0</h2>
                    <span class="text-slate-400 text-xs font-bold">โครงการ</span>
                </div>
            </div>
        </div>
    </div>

    <div class="relative overflow-hidden bg-white/70 backdrop-blur-xl rounded-[2.5rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-white/60 hover:shadow-[0_30px_60px_rgba(0,0,0,0.1)] transition-all duration-500 group">
        <div class="absolute -right-6 -top-6 w-32 h-32 bg-amber-500/10 rounded-full blur-3xl group-hover:bg-amber-500/20 transition-colors"></div>
        <div class="relative flex items-center gap-6">
            <div class="w-16 h-16 bg-gradient-to-br from-amber-400 to-orange-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-amber-200 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-500 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <div>
                <p class="text-slate-500 text-[15px] font-bold uppercase tracking-[0.15em] mb-1">จำนวนเล่มแผน</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="cardTotalDocs" class="text-2xl font-black text-slate-800 tracking-tight transition-all">0</h2>
                    <span class="text-slate-400 text-xs font-bold">เล่ม</span>
                </div>
            </div>
        </div>
    </div>

</div>

        <div class="bg-white rounded-[1.5rem] md:rounded-[2.5rem] shadow-sm p-4 md:p-8 mb-12 border border-slate-100">
    <div class="flex flex-col xl:flex-row items-end gap-4">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 flex-grow w-full">
            <div class="space-y-1">
                <label class="text-[13px] font-bold text-slate-600 ml-1 uppercase tracking-wider">อำเภอ</label>
                <select id="sAmphoe" onchange="loadData()" class="w-full bg-slate-50 border-none rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 text-[13px] font-medium appearance-none shadow-sm cursor-pointer">
                    <option value="">กำลังโหลด...</option>
                </select>
            </div>

            <div class="space-y-1">
                <label class="text-[13px] font-bold text-slate-600 ml-1 uppercase tracking-wider">เล่มแผน</label>
                <select id="sPlanDoc" onchange="loadData()" class="w-full bg-slate-50 border-none rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 text-[13px] font-medium appearance-none shadow-sm cursor-pointer">
                    <option value="">ทั้งหมด</option>
                </select>
            </div>

            <div class="space-y-1">
                <label class="text-[13px] font-bold text-slate-600 ml-1 uppercase tracking-wider">อปท.</label>
                <input type="text" id="sOpt" onkeyup="loadData()" placeholder="ระบุ อบต./เทศบาล..." class="w-full bg-slate-50 border-none rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 text-[13px] placeholder:text-slate-300 shadow-sm">
            </div>

            <div class="space-y-1 lg:col-span-1">
                <label class="text-[13px] font-bold text-slate-600 ml-1 uppercase tracking-wider">ชื่อโครงการ</label>
                <input type="text" id="sProject" onkeyup="loadData()" placeholder="พิมพ์ชื่อโครงการ..." class="w-full bg-slate-50 border-none rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 text-[13px] placeholder:text-slate-300 shadow-sm">
            </div>

            <div class="space-y-1">
                <label class="text-[13px] font-bold text-slate-600 ml-1 uppercase tracking-wider">สถานะ</label>
                <input type="text" id="sStatus" onkeyup="loadData()" placeholder="สถานะโครงการ..." class="w-full bg-slate-50 border-none rounded-xl px-3 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 text-[13px] placeholder:text-slate-300 shadow-sm">
            </div>
        </div>
        
        <div class="flex items-center gap-2 pb-0.5 w-full xl:w-auto justify-end border-t xl:border-t-0 pt-4 xl:pt-0">
            <div class="relative group inline-block">
                <button onclick="exportToExcel()" class="w-11 h-11 flex items-center justify-center bg-emerald-50 hover:bg-emerald-600 text-emerald-600 hover:text-white rounded-xl transition-all duration-300 border border-emerald-100 active:scale-95 shadow-sm group/btn">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </button>
            </div>
            <div class="relative group inline-block">
                <button onclick="clearSearch()" class="w-11 h-11 flex items-center justify-center bg-slate-50 hover:bg-blue-50 text-slate-400 hover:text-blue-600 rounded-xl transition-all duration-300 border border-slate-100 active:scale-90 group-hover:rotate-180">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform duration-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </div>
    </div>
</div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <div id="dataTableBody" class="divide-y divide-slate-100">
        </div>
            <div id="pagination" class="flex justify-center items-center gap-2 py-6 bg-slate-50 border-t border-slate-100">
    </div>

    <div id="loading" class="hidden py-10 text-center">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
        <p class="mt-4 text-slate-500 font-medium text-sm">กำลังโหลดข้อมูล...</p>
    </div>
</div>
    </main>

    <footer class="bg-white/30 backdrop-blur-md border-t border-slate-100 py-6">
    <div class="max-w-7xl mx-auto px-4 text-center">
        <p class="text-sm font-bold text-slate-800 mb-2">© 2026 องค์การบริหารส่วนจังหวัดนครปฐม</p>
        <p class="text-xs text-slate-400 mb-6">ฝ่ายนโยบายและแผนงาน กองยุทธศาสตร์และงบประมาณ</p>
        <button id="btnLoginMain" onclick="toggleLoginModal()" class="inline-flex items-center gap-2 text-slate-300 hover:text-blue-600 transition-all font-bold text-xs">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" /></svg>
            ADMIN LOGIN
        </button>
    </div>
</footer>

    <script src="script.js"></script>
</body>
</html>
