<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาโครงการแผนพัฒนาท้องถิ่น | NKPPAO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f8fafc] text-slate-800">

    <nav class="bg-gradient-to-r from-[#003366] to-[#004a99] text-white py-5 px-6 shadow-lg border-b-4 border-amber-400">
    <div class="container mx-auto">
        <div class="flex items-center space-x-4">
            <div class="p-2 bg-white rounded-full shadow-inner flex items-center justify-center w-12 h-12">
                <img src="https://nkppao.github.io/local/budget/img/logo.png" alt="Logo" class="w-10 h-10 object-contain">
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold leading-tight">ระบบค้นหาโครงการแผนพัฒนาท้องถิ่น</h1>
                <p class="text-xs md:text-sm font-light opacity-90 uppercase tracking-wider">Nakhon Pathom Provincial Administrative Organization</p>
            </div>
        </div>
    </div>
</nav>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-600 flex justify-between items-center">
                <div>
                    <p class="text-sm font-medium text-slate-500 uppercase">โครงการทั้งหมด</p>
                    <h2 id="countProjects" class="text-3xl font-bold text-slate-800">0</h2>
                </div>
                <div class="bg-blue-50 p-3 rounded-full text-blue-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-emerald-500 flex justify-between items-center">
                <div>
                    <p class="text-sm font-medium text-slate-500 uppercase">งบประมาณรวม</p>
                    <h2 id="totalBudget" class="text-2xl font-bold text-slate-800">0.00</h2>
                </div>
                <div class="bg-emerald-50 p-3 rounded-full text-emerald-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-amber-500 flex justify-between items-center">
                <div>
                    <p class="text-sm font-medium text-slate-500 uppercase">จำนวนเล่มแผน</p>
                    <h2 id="countDocs" class="text-3xl font-bold text-slate-800">0</h2>
                </div>
                <div class="bg-amber-50 p-3 rounded-full text-amber-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-3">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </span>
                        <input type="text" id="searchInput" placeholder="พิมพ์ชื่อโครงการ, อปท. หรือ อำเภอ เพื่อค้นหา..." 
                            class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                    </div>
                </div>
                <button id="searchBtn" class="bg-[#003366] hover:bg-[#002244] text-white font-bold py-3 px-6 rounded-xl transition duration-200 shadow-md flex items-center justify-center space-x-2">
                    <span>ค้นหาข้อมูล</span>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-[#003366] text-xs font-bold uppercase tracking-wider">
                            <th class="px-6 py-5">ข้อมูลโครงการ / สถานะ</th>
                            <th class="px-6 py-5">อปท. / อำเภอ</th>
                            <th class="px-6 py-5 text-right">งบประมาณ</th>
                            <th class="px-6 py-5 text-center">อ้างอิงเล่มแผน PDF</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            <div id="loading" class="hidden py-20 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
                <p class="mt-4 text-slate-500 font-medium">กำลังรวบรวมข้อมูลแผนพัฒนา...</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
