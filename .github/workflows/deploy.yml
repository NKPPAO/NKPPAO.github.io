name: Smart Portal CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Inject Supabase Keys
        run: |
          # 1. แทนที่ค่าในไฟล์ index.html ที่อยู่ในโฟลเดอร์ smartservices
          sed -i "s|MY_URL_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_URL }}|g" smartservices/index.html
          sed -i "s|MY_KEY_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}|g" smartservices/index.html
          
          # 2. ตรวจสอบใน Log ว่าสำเร็จไหม (ถ้าสำเร็จจะเห็นเป็น ***)
          echo "Checking Injection Result:"
          grep "const SUPABASE_URL" smartservices/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: smartservices # ดึงเฉพาะไฟล์ในโฟลเดอร์นี้ออกมา
          branch: gh-pages      # ส่งไปที่สาขาสำหรับแสดงผล
          target-folder: smartservices # บังคับให้วางไว้ในโฟลเดอร์ชื่อ smartservices บนสาขาปลายทาง
          clean: true
