<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาโครงการแผนพัฒนาท้องถิ่น | NKPPAO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#f4f7f9] text-slate-800">

    <nav class="bg-[#003366] text-white py-4 px-6 shadow-md border-b-4 border-yellow-500">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">ระบบค้นหาโครงการตามแผนพัฒนาท้องถิ่น</h1>
                <p class="text-[10px] uppercase tracking-widest opacity-70">Nakhon Pathom Provincial Administrative Organization</p>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-3">
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">ค้นหาโครงการ / พื้นที่ / อปท.</label>
                    <input type="text" id="searchInput" placeholder="พิมพ์คำที่ต้องการค้นหา..." 
                        class="w-full border border-slate-300 rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-500 transition">
                </div>
                <div class="flex items-end">
                    <button id="searchBtn" class="w-full bg-[#0056b3] hover:bg-[#004494] text-white font-bold py-3 rounded-lg shadow-lg transition-all active:scale-95">
                        ค้นหาข้อมูล
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-xs uppercase font-bold">
                            <th class="px-6 py-4">รายละเอียดโครงการ</th>
                            <th class="px-6 py-4">อปท. / อำเภอ</th>
                            <th class="px-6 py-4">งบประมาณ</th>
                            <th class="px-6 py-4 text-center">อ้างอิงเล่มแผน (PDF)</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
