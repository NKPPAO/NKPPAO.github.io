name: Smart Portal CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Inject Supabase Keys
        run: |
          # 1. เช็คก่อนว่ามีไฟล์อยู่จริงไหม (จะโชว์ใน Log Actions)
          ls -R smartservices/
          
          # 2. ใช้ @ แทน | เพื่อความปลอดภัยของ URL และระบุ Path ให้เป๊ะ
          # เราใช้คำสั่งค้นหาคำว่า {{...}} ในไฟล์ smartservices/index.html
          sed -i 's@{{SUPABASE_SMARTSERVICES_URL}}@${{ secrets.SUPABASE_SMARTSERVICES_URL }}@g' smartservices/index.html
          sed -i 's@{{SUPABASE_SMARTSERVICES_ANON_KEY}}@${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}@g' smartservices/index.html
          
          # 3. ตรวจสอบว่าเปลี่ยนสำเร็จไหม (จะโชว์ใน Log เป็น ***)
          grep "const SUPABASE_URL" smartservices/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # สำคัญ: ถ้าต้องการให้หน้าเว็บอยู่ที่ nkppao.github.io/smartservices/
          # เราควรส่งไฟล์จาก Root (.) ขึ้นไป เพื่อรักษาโครงสร้างโฟลเดอร์ไว้
          folder: . 
          branch: gh-pages
