<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Service Portal | ระบบบริการประชาชน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="layout-grid" class="text-white w-6 h-6"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-blue-900">Nakhon Pathom PAO | SMART SERVICE PORTAL</span>
            </div>
            <div id="auth-section" class="flex items-center gap-4">
                <button id="btn-login" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-sm transition-all font-medium shadow-md">
                    เข้าสู่ระบบ
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 py-12 px-4">
        <div class="max-w-7xl mx-auto text-center text-white">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">ยินดีต้อนรับสู่ศูนย์บริการออนไลน์</h1>
            <p class="text-blue-100 text-lg max-w-2xl mx-auto">Nakhon Pathom PAO | เมืองแห่งคุณภาพชีวิต สู่การพัฒนาที่ยั่งยืน</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10 -mt-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-green-100 p-3 rounded-full text-green-600"><i data-lucide="check-circle"></i></div>
                <div><p class="text-slate-500 text-sm">บริการทั้งหมด</p><h3 class="text-2xl font-bold" id="total-services-count">0 บริการ</h3></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-blue-100 p-3 rounded-full text-blue-600"><i data-lucide="clock"></i></div>
                <div><p class="text-slate-500 text-sm">อยู่ระหว่างดำเนินการ</p><h3 class="text-2xl font-bold" id="pending-count">0 รายการ</h3></div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="bg-indigo-100 p-3 rounded-full text-indigo-600"><i data-lucide="user"></i></div>
                <div><p class="text-slate-500 text-sm">สถานะบัญชี</p><h3 class="text-lg font-semibold truncate" id="user-display">กำลังโหลด...</h3></div>
            </div>
        </div>

        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
            <i data-lucide="component" class="text-blue-600"></i> เลือกรับบริการ
        </h2>
        <div id="service-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="animate-pulse bg-white p-6 rounded-2xl h-40"></div>
            <div class="animate-pulse bg-white p-6 rounded-2xl h-40"></div>
            <div class="animate-pulse bg-white p-6 rounded-2xl h-40"></div>
            <div class="animate-pulse bg-white p-6 rounded-2xl h-40"></div>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h2>
                <button onclick="toggleAuthModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">อีเมล</label>
                    <input type="email" id="auth-email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="name@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
                    <input type="password" id="auth-password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="••••••••" required>
                </div>
                <button type="submit" id="btn-auth-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-slate-500 text-sm">
                    <span id="auth-switch-text">ยังไม่มีบัญชีใช่ไหม?</span>
                    <button onclick="switchAuthMode()" id="btn-switch-mode" class="text-blue-600 font-bold hover:underline ml-1">สมัครสมาชิก</button>
                </p>
            </div>
        </div>
    </div>
</div>

    <script>
        // --- ส่วนการตั้งค่า Supabase ---
        const SUPABASE_URL = 'https://qivysmrrauxskzjjyecw.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpdnlzbXJyYXV4c2t6amp5ZWN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjYyMTcsImV4cCI6MjA4ODQ0MjIxN30.-wVRDazgM1x83LSyco-xtchqj_JnM0NQJ-26a1N5DuI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ฟังก์ชันเริ่มทำงานเมื่อโหลดหน้าเว็บ
        document.addEventListener('DOMContentLoaded', async () => {
            lucide.createIcons(); 
            await updateDashboardStats(); // ดึงตัวเลขสถิติ
            await loadServices();        // ดึงรายการ Card บริการ
            await checkUserStatus();     // ตรวจสอบสถานะล็อกอิน
        });

        // 1. ฟังก์ชันดึงตัวเลขสถิติ (Total Services & Pending Requests)
        async function updateDashboardStats() {
            try {
                // นับจำนวนบริการทั้งหมด
                const { count: totalServices } = await supabaseClient
                    .from('services')
                    .select('*', { count: 'exact', head: true })
                    .eq('is_active', true);

                // นับจำนวนคำขอที่ 'Pending' (ปรับชื่อตาราง/คอลัมน์ตามของคุณ)
                const { count: pendingCount } = await supabaseClient
                    .from('service_requests') 
                    .select('*', { count: 'exact', head: true })
                    .eq('status', 'Pending');

                // แสดงผลบนหน้าเว็บ (ใส่ ID ให้ครอบตัวเลขใน HTML ด้วย)
                document.getElementById('total-services-count').innerText = `${totalServices || 0} บริการ`;
                document.getElementById('pending-count').innerText = `${pendingCount || 0} รายการ`;
            } catch (err) {
                console.error('Error updating stats:', err);
            }
        }

        // 2. ฟังก์ชันตรวจสอบสถานะบัญชี (Auth Status)
        async function checkUserStatus() {
            const userDisplay = document.getElementById('user-display');
            const btnLogin = document.getElementById('btn-login');

            const { data: { user } } = await supabaseClient.auth.getUser();

            if (user) {
                userDisplay.innerText = user.email.split('@')[0]; // แสดงชื่อจาก Email
                btnLogin.innerText = 'ออกจากระบบ';
                btnLogin.onclick = async () => {
                    await supabaseClient.auth.signOut();
                    window.location.reload();
                };
            } else {
                userDisplay.innerText = 'บุคคลทั่วไป';
                btnLogin.onclick = () => {
                    // ใส่ลิงก์หน้า Login ของคุณที่นี่
                    alert('กรุณาเข้าสู่ระบบผ่านระบบยืนยันตัวตน');
                };
            }
        }

        // 3. ฟังก์ชันดึงรายการบริการ (คงเดิมแต่ปรับปรุง Error Handling)
        async function loadServices() {
            const serviceContainer = document.getElementById('service-list');
            try {
                const { data: services, error } = await supabaseClient
                    .from('services')
                    .select('*')
                    .eq('is_active', true)
                    .order('name', { ascending: true });

                if (error) throw error;
                if (!services || services.length === 0) {
                    serviceContainer.innerHTML = '<p class="col-span-full text-center text-slate-400">ยังไม่มีบริการเปิดให้ใช้งานในขณะนี้</p>';
                    return;
                }

                serviceContainer.innerHTML = '';
                services.forEach(item => {
                    const card = `
                        <div onclick="handleServiceClick('${item.name}')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md hover:-translate-y-1 transition-all cursor-pointer group">
                            <div class="bg-blue-50 w-12 h-12 flex items-center justify-center rounded-xl text-blue-600 mb-4 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i data-lucide="file-text"></i>
                            </div>
                            <h3 class="font-bold text-lg mb-1">${item.name}</h3>
                            <p class="text-slate-500 text-sm mb-4 line-clamp-2">${item.description || 'คลิกเพื่อดูรายละเอียดและยื่นคำร้อง'}</p>
                            <span class="text-blue-600 text-sm font-semibold flex items-center gap-1 group-hover:underline">
                                เลือกบริการ <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </span>
                        </div>
                    `;
                    serviceContainer.innerHTML += card;
                });
                lucide.createIcons();
            } catch (err) {
                serviceContainer.innerHTML = `<p class="col-span-full text-center text-red-500">ขออภัย: ${err.message}</p>`;
            }
        }

        let isSignUpMode = false;
let currentUser = null;

// ฟังก์ชันเปิด-ปิด Modal
function toggleAuthModal() {
    const modal = document.getElementById('auth-modal');
    modal.classList.toggle('hidden');
    modal.classList.toggle('flex');
}

// สลับระหว่าง Login และ Register
function switchAuthMode() {
    isSignUpMode = !isSignUpMode;
    document.getElementById('modal-title').innerText = isSignUpMode ? 'สมัครสมาชิก' : 'เข้าสู่ระบบ';
    document.getElementById('btn-auth-submit').innerText = isSignUpMode ? 'สร้างบัญชี' : 'เข้าสู่ระบบ';
    document.getElementById('auth-switch-text').innerText = isSignUpMode ? 'มีบัญชีอยู่แล้ว?' : 'ยังไม่มีบัญชีใช่ไหม?';
    document.getElementById('btn-switch-mode').innerText = isSignUpMode ? 'เข้าสู่ระบบ' : 'สมัครสมาชิก';
}

// จัดการการ Login/Register
document.getElementById('auth-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const btnSubmit = document.getElementById('btn-auth-submit');

    btnSubmit.disabled = true;
    btnSubmit.innerText = 'กำลังดำเนินการ...';

    try {
        if (isSignUpMode) {
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            alert('สมัครสมาชิกสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยันตัวตน (ถ้ามี)');
        } else {
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
        }
        toggleAuthModal();
        window.location.reload();
    } catch (err) {
        alert('ผิดพลาด: ' + err.message);
    } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerText = isSignUpMode ? 'สร้างบัญชี' : 'เข้าสู่ระบบ';
    }
});

// ตรวจสอบสถานะ User และปุ่มเข้าสู่ระบบ
async function checkUserStatus() {
    const userDisplay = document.getElementById('user-display');
    const btnLogin = document.getElementById('btn-login');

    const { data: { user } } = await supabaseClient.auth.getUser();
    currentUser = user;

    if (user) {
        userDisplay.innerText = user.email.split('@')[0];
        btnLogin.innerText = 'ออกจากระบบ';
        btnLogin.onclick = async () => {
            await supabaseClient.auth.signOut();
            window.location.reload();
        };
    } else {
        userDisplay.innerText = 'บุคคลทั่วไป';
        btnLogin.innerText = 'เข้าสู่ระบบ';
        btnLogin.onclick = toggleAuthModal;
    }
}

// ฟังก์ชันเมื่อคลิกเลือกบริการ
function handleServiceClick(serviceName) {
    if (!currentUser) {
        alert('กรุณาเข้าสู่ระบบก่อนยื่นคำร้อง');
        toggleAuthModal();
    } else {
        alert('กำลังนำคุณไปที่หน้ายื่นคำร้องสำหรับ: ' + serviceName);
        // window.location.href = `request.html?service=${serviceName}`;
    }
}
    </script>
</body>
</html>
