name: Smart Portal CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Inject Supabase Keys
        run: |
          # ค้นหาไฟล์ index.html ทั้งหมดและทำการแทนที่ (แก้ปัญหาเรื่องโฟลเดอร์ซ้อน)
          find . -name "index.html" -exec sed -i "s|MY_URL_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_URL }}|g" {} +
          find . -name "index.html" -exec sed -i "s|MY_KEY_PLACEHOLDER|${{ secrets.SUPABASE_SMARTSERVICES_ANON_KEY }}|g" {} +
          
          echo "✅ ตรวจสอบผลลัพธ์หลังแทนที่:"
          # พิมพ์บรรทัดที่มีการแทนที่ออกมาดู (GitHub จะเซนเซอร์เป็น *** ให้เอง)
          grep "const SUPABASE_URL" smartservices/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # เปลี่ยนไปใช้โฟลเดอร์ที่มีไฟล์ index.html ของคุณโดยตรง
          folder: smartservices 
          branch: gh-pages
